<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Resume Analyzer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <a href="{{ url_for('index') }}" class="brand">
                <span class="brand-mark">◆</span> Resume<span class="brand-accent">Match</span>
            </a>
            <nav class="topnav">
                <a href="{{ url_for('index') }}">Analyze</a>
                <a href="{{ url_for('history') }}">History</a>
            </nav>
        </header>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-stack">
                    {% for message in messages %}
                        <div class="flash">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <main class="content">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            Built for fast, explainable resume &ndash; job matching.
        </footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
